name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        exclude:
          # Only test beta on ubuntu to save CI time
          - os: macos-latest
            rust: beta
          - os: windows-latest
            rust: beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        shell: bash
        run: |
          python3 - <<'PY'
          import json, subprocess, sys

          meta = json.loads(subprocess.check_output([
              "cargo", "metadata", "--no-deps", "--format-version", "1"
          ]))

          testable = False
          for pkg in meta["packages"]:
              for target in pkg["targets"]:
                  kinds = set(target["kind"])
                  if kinds & {"lib", "bin", "proc-macro"}:
                      testable = True
                      break
              if testable:
                  break

          if testable:
              sys.exit(subprocess.call(["cargo", "test", "--verbose"]))
          else:
              print("No testable Cargo targets found, skipping tests.")
              sys.exit(0)
          PY

      - name: Run tests (release mode)
        shell: bash
        run: |
          python3 - <<'PY'
          import json, subprocess, sys

          meta = json.loads(subprocess.check_output([
              "cargo", "metadata", "--no-deps", "--format-version", "1"
          ]))

          testable = False
          for pkg in meta["packages"]:
              for target in pkg["targets"]:
                  kinds = set(target["kind"])
                  if kinds & {"lib", "bin", "proc-macro"}:
                      testable = True
                      break
              if testable:
                  break

          if testable:
              sys.exit(subprocess.call(["cargo", "test", "--release", "--verbose"]))
          else:
              print("No testable Cargo targets found, skipping release tests.")
              sys.exit(0)
          PY

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binaries
        run: cargo build --release --verbose

      - name: Verify binaries exist
        run: |
          ls -la target/release/todo-tree
          ls -la target/release/tt
