name: Todo Tree

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  todo-tree-action:
    name: Todo Tree
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Run Todo Tree
        uses: alexandretrotel/todo-tree-action@v1.0.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changed-only: true
